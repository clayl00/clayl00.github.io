<div class="chat-container">
  <header class="chat-header">
    <router-link :to="`/chat/${chatId}`" class="btn-back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 2px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      BACK TO CHAT
    </router-link>
    <div style="display: flex; align-items: center; gap: 12px;">
      <h3>Document Suggestions</h3>
    </div>
  </header>

  <div class="suggestion-layout">
    <div class="pdf-workspace">
      <div v-if="pdfSrc === 'loading'" style="padding: 40px; text-align: center; color: var(--ink-light);">Loading document...</div>
      
      <div v-else-if="pdfSrc" class="pdf-canvas">
        <iframe :key="pdfSrc" :src="pdfSrc" style="width: 100%; height: 100%; border: none;"></iframe>
      </div>
    </div>

    <div class="suggestion-sidebar">
      
      <div class="suggestion-list">
        <div v-if="suggestions.length === 0" style="text-align: center; color: var(--ink-light); margin-top: 40px; font-style: italic;">
          No suggestions yet.
        </div>
        
        <div v-for="sug in suggestions" :key="sug.url" class="suggestion-card">
          <div class="profile-info">
            <strong>{{ getProfileName(sug.actor) }}</strong>
            <span>{{ new Date(sug.value.published).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) }}</span>
          </div>
          
          <div style="margin-top: 8px; font-weight: bold; color: var(--primary);">
            Page {{ sug.value.page }} <span v-if="sug.value.location">| {{ sug.value.location }}</span>
          </div>

          <p style="margin-top: 8px; font-size: 0.95rem; line-height: 1.4;">{{ sug.value.content }}</p>
          
          <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px;">
            <button class="btn-small btn-outline" @click="jumpToPage(sug.value.page)">Jump to Page</button>
            <button v-if="session && sug.actor === session.actor" class="delete-btn" @click="deleteSuggestion(sug.url)">delete</button>
          </div>
        </div>
      </div>

      <div class="suggestion-composer">
        <div v-if="!isMakingSuggestion">
          <button class="btn-primary" style="width: 100%;" @click="startMakingSuggestion">Make New Suggestion</button>
        </div>
        <div v-else>
           <div style="display: flex; gap: 12px; margin-bottom: 12px;">
             <div style="flex: 1;">
               <label style="font-weight: bold; font-size: 0.8rem; display: block; margin-bottom: 4px;">Page # *</label>
               <input type="number" class="input-styled" v-model="newPageNum" placeholder="e.g. 3" style="width: 100%; padding: 8px 12px;" />
             </div>
             <div style="flex: 2;">
               <label style="font-weight: bold; font-size: 0.8rem; display: block; margin-bottom: 4px;">Location (Measure, Bar)</label>
               <input type="text" class="input-styled" v-model="newLocation" placeholder="e.g. Measure 42" style="width: 100%; padding: 8px 12px;" />
             </div>
           </div>

           <label style="font-weight: bold; font-size: 0.8rem; margin-bottom: 4px; display: block;">Feedback *</label>
           <textarea class="textarea-styled" v-model="newSuggestionText" placeholder="Type your suggestion..." style="width: 100%; margin-bottom: 12px;"></textarea>

           <div style="display: flex; gap: 8px;">
             <button class="btn-primary" style="flex-grow: 1;" @click="postSuggestion" :disabled="!newSuggestionText.trim() || !newPageNum.toString().trim()">Post</button>
             <button class="btn-outline" @click="cancelSuggestion">Cancel</button>
           </div>
        </div>
      </div>
      
    </div>
  </div>
</div>
